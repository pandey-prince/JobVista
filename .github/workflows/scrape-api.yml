name: Scrape API Sources

on:
  schedule:
    # Every 6 hours (aligned with Render cron intent)
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: scrape-api
  cancel-in-progress: false

jobs:
  api-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Sync API career sources
        working-directory: backend
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          SKIP_PUPPETEER_SCRAPERS: "true"
          API_FAIL_ON_PARTIAL: "false"
          API_MIN_SUCCESS: "1"
        run: node scripts/sync-api.js

      - name: Source health report
        if: always()
        working-directory: backend
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: node scripts/source-health.js --report-only
        continue-on-error: true
