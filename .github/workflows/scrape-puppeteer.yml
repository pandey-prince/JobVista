name: Scrape Puppeteer Sources

on:
  schedule:
    # Daily 02:30 UTC (8:00 AM IST)
    - cron: "30 2 * * *"
  workflow_dispatch:

concurrency:
  group: scrape-puppeteer
  cancel-in-progress: false

jobs:
  priority-puppeteer:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Install Puppeteer Chrome
        working-directory: backend
        run: npx puppeteer browsers install chrome

      - name: Sync user-queued Puppeteer sources
        working-directory: backend
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          SKIP_PUPPETEER_SCRAPERS: "false"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "false"
        run: node scripts/sync-puppeteer-priority.js
        continue-on-error: true

  reprobe:
    needs: priority-puppeteer
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Re-probe auto-puppeteer sources
        working-directory: backend
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: node scripts/reprobe-sources.js
        continue-on-error: true

  puppeteer-sync:
    needs: reprobe
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Install Puppeteer Chrome
        working-directory: backend
        run: npx puppeteer browsers install chrome

      - name: Sync Puppeteer career sources (shard ${{ matrix.shard }})
        working-directory: backend
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          SKIP_PUPPETEER_SCRAPERS: "false"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "false"
          PUPPETEER_FAIL_ON_PARTIAL: "false"
          PUPPETEER_MIN_SUCCESS: "1"
          PUPPETEER_SHARD: ${{ matrix.shard }}
          PUPPETEER_SHARD_COUNT: "3"
        run: node scripts/sync-puppeteer.js

  health-report:
    needs: puppeteer-sync
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Source health report
        working-directory: backend
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: node scripts/source-health.js --report-only
        continue-on-error: true
