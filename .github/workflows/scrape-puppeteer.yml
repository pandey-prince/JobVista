name: Scrape Puppeteer Sources

on:
  schedule:
    # Three timed buckets/day (UTC) so each source is scraped ~1×/24h via hash(id)%3
    - cron: "30 2 * * *" # bucket 0 — 08:00 IST
    - cron: "30 10 * * *" # bucket 1 — 16:00 IST
    - cron: "30 18 * * *" # bucket 2 — 00:00 IST
  workflow_dispatch:
    inputs:
      bucket:
        description: "Puppeteer bucket (0, 1, or 2)"
        required: true
        type: choice
        options:
          - "0"
          - "1"
          - "2"
        default: "0"

concurrency:
  group: scrape-puppeteer
  cancel-in-progress: false

jobs:
  priority-puppeteer:
    runs-on: ubuntu-latest
    # Cap keeps this job under budget; remaining queue drains across later runs.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Install Puppeteer Chrome
        working-directory: backend
        run: npx puppeteer browsers install chrome

      - name: Sync user-queued Puppeteer sources
        working-directory: backend
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          SKIP_PUPPETEER_SCRAPERS: "false"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "false"
          PUPPETEER_PRIORITY_MAX: "8"
        run: node scripts/sync-puppeteer-priority.js
        continue-on-error: true

  reprobe:
    needs: priority-puppeteer
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Re-probe auto-puppeteer sources
        working-directory: backend
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: node scripts/reprobe-sources.js
        continue-on-error: true

  resolve-bucket:
    needs: reprobe
    if: always()
    runs-on: ubuntu-latest
    outputs:
      bucket: ${{ steps.pick.outputs.bucket }}
    steps:
      - name: Pick bucket from schedule or dispatch
        id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "bucket=${{ github.event.inputs.bucket }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 2 * * *" ]; then
            echo "bucket=0" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 10 * * *" ]; then
            echo "bucket=1" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 18 * * *" ]; then
            echo "bucket=2" >> "$GITHUB_OUTPUT"
          else
            echo "bucket=0" >> "$GITHUB_OUTPUT"
          fi

  puppeteer-sync:
    needs: resolve-bucket
    if: always() && needs.resolve-bucket.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Install Puppeteer Chrome
        working-directory: backend
        run: npx puppeteer browsers install chrome

      - name: Sync Puppeteer career sources (bucket ${{ needs.resolve-bucket.outputs.bucket }})
        working-directory: backend
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          SKIP_PUPPETEER_SCRAPERS: "false"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "false"
          PUPPETEER_FAIL_ON_PARTIAL: "false"
          PUPPETEER_MIN_SUCCESS: "1"
          PUPPETEER_BUCKET: ${{ needs.resolve-bucket.outputs.bucket }}
          PUPPETEER_BUCKET_COUNT: "3"
        run: node scripts/sync-puppeteer.js

  health-report:
    needs: puppeteer-sync
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Source health report
        working-directory: backend
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: node scripts/source-health.js --report-only
        continue-on-error: true
