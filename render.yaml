# Render Blueprint — https://dashboard.render.com
# Connect repo: pandey-prince/JobVista → New Blueprint → use this file
# Set secret env vars in Render dashboard after first deploy.

services:
  - type: web
    name: jobvista-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /home
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://job-vista-eta.vercel.app
      - key: SCRAPE_ENABLED
        value: true
      - key: SCRAPE_ON_BOOT
        value: false
      - key: SCRAPE_CRON_SCHEDULE
        value: 0 */6 * * *
      - key: MAX_UPSERTS_PER_SOURCE
        value: 0
      - key: SCRAPE_DELAY_MS
        value: 1500
      - key: LINK_CHECK_ENABLED
        value: true
      - key: LINK_CHECK_CRON
        value: 0 3 * * *
      - key: LINK_CHECK_BATCH_SIZE
        value: 50
      - key: LINK_CHECK_DELAY_MS
        value: 1000
      - key: LINK_CHECK_FAIL_THRESHOLD
        value: 3
      - key: LINK_CHECK_AFTER_SYNC
        value: true
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: true
      - key: SKIP_PUPPETEER_SCRAPERS
        value: true
      - key: MONGO_URI
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: API_BASE_URL
        value: https://jobvista-ahek.onrender.com
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ALERT_DIGEST_CRON
        value: 30 14 * * *
